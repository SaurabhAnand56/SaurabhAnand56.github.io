<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f13"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="36" fill="#ffffff" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle" opacity="0.75" letter-spacing="-0.3">Sample vs Population Variance — The n-1 Effect</text>

  <!-- LEFT PANEL: Population (all 5 dots) -->
  <text x="160" y="68" fill="#2cb67d" font-size="11" text-anchor="middle" letter-spacing="2" opacity="0.85">POPULATION (N=5)</text>
  <text x="160" y="84" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">Divide by N — exact spread</text>

  <!-- Number line -->
  <line x1="50" y1="130" x2="270" y2="130" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <!-- Tick marks -->
  <line x1="60" y1="124" x2="60" y2="136" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="105" y1="124" x2="105" y2="136" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="150" y1="124" x2="150" y2="136" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="195" y1="124" x2="195" y2="136" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="240" y1="124" x2="240" y2="136" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <text x="60" y="148" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">2</text>
  <text x="105" y="148" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">4</text>
  <text x="150" y="148" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">6</text>
  <text x="195" y="148" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">8</text>
  <text x="240" y="148" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">10</text>

  <!-- All 5 data points -->
  <circle cx="60" cy="115" r="8" fill="#2cb67d" opacity="0.9"/>
  <circle cx="105" cy="115" r="8" fill="#2cb67d" opacity="0.9"/>
  <circle cx="150" cy="115" r="8" fill="#2cb67d" opacity="0.9"/>
  <circle cx="195" cy="115" r="8" fill="#2cb67d" opacity="0.9"/>
  <circle cx="240" cy="115" r="8" fill="#2cb67d" opacity="0.9"/>

  <!-- Mean line -->
  <line x1="150" y1="95" x2="150" y2="155" stroke="#f7c948" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="150" y="90" fill="#f7c948" font-size="9" text-anchor="middle" opacity="0.8">μ = 6</text>

  <!-- Deviation arrows -->
  <line x1="60" y1="115" x2="148" y2="115" stroke="#7f5af0" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>
  <line x1="240" y1="115" x2="152" y2="115" stroke="#7f5af0" stroke-width="1.5" opacity="0.6"/>

  <!-- Population variance formula -->
  <rect x="50" y="170" width="220" height="44" rx="8" fill="#2cb67d" opacity="0.08" stroke="#2cb67d" stroke-width="1" stroke-opacity="0.3"/>
  <text x="160" y="188" fill="#ffffff" font-size="11" text-anchor="middle" opacity="0.6">σ² = Σ(xᵢ - μ)² / N</text>
  <text x="160" y="204" fill="#2cb67d" font-size="12" text-anchor="middle" font-weight="bold">= 40 / 5 = 8.0</text>

  <!-- Verdict -->
  <text x="160" y="234" fill="#2cb67d" font-size="10" text-anchor="middle" opacity="0.7">✓ True variance. No estimation needed.</text>

  <!-- DIVIDER -->
  <line x1="310" y1="55" x2="310" y2="380" stroke="#ffffff" stroke-width="1" opacity="0.05"/>

  <!-- RIGHT PANEL: Sample (3 of 5 dots) -->
  <text x="560" y="68" fill="#7f5af0" font-size="11" text-anchor="middle" letter-spacing="2" opacity="0.85">SAMPLE (n=3 of 5)</text>
  <text x="560" y="84" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">Divide by n-1 — corrects underestimation</text>

  <!-- Number line -->
  <line x1="390" y1="130" x2="730" y2="130" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="420" y1="124" x2="420" y2="136" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="500" y1="124" x2="500" y2="136" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="580" y1="124" x2="580" y2="136" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="660" y1="124" x2="660" y2="136" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="700" y1="124" x2="700" y2="136" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <text x="420" y="148" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">2</text>
  <text x="500" y="148" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">4</text>
  <text x="580" y="148" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">6</text>
  <text x="660" y="148" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">8</text>
  <text x="700" y="148" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3">10</text>

  <!-- Ghost dots (not sampled) -->
  <circle cx="580" cy="115" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.15" stroke-dasharray="3,3"/>
  <circle cx="700" cy="115" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.15" stroke-dasharray="3,3"/>

  <!-- Sampled dots -->
  <circle cx="420" cy="115" r="8" fill="#7f5af0" opacity="0.9"/>
  <circle cx="500" cy="115" r="8" fill="#7f5af0" opacity="0.9"/>
  <circle cx="660" cy="115" r="8" fill="#7f5af0" opacity="0.9"/>

  <!-- Sample mean line -->
  <line x1="527" y1="95" x2="527" y2="155" stroke="#f7c948" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="527" y="90" fill="#f7c948" font-size="9" text-anchor="middle" opacity="0.8">x̄ = 4.67</text>

  <!-- True mean ghost line -->
  <line x1="580" y1="100" x2="580" y2="150" stroke="#2cb67d" stroke-width="1" stroke-dasharray="3,4" opacity="0.35"/>
  <text x="580" y="165" fill="#2cb67d" font-size="8" text-anchor="middle" opacity="0.4">true μ=6</text>

  <!-- n-1 formula box -->
  <rect x="390" y="170" width="340" height="44" rx="8" fill="#7f5af0" opacity="0.08" stroke="#7f5af0" stroke-width="1" stroke-opacity="0.3"/>
  <text x="560" y="188" fill="#ffffff" font-size="11" text-anchor="middle" opacity="0.6">s² = Σ(xᵢ - x̄)² / (n-1)</text>
  <text x="560" y="204" fill="#7f5af0" font-size="12" text-anchor="middle" font-weight="bold">= 46.67 / 2 = 23.33  (vs 15.56 with n)</text>

  <!-- Correction label -->
  <text x="560" y="234" fill="#7f5af0" font-size="10" text-anchor="middle" opacity="0.7">↑ Corrected upward — closer to true σ² = 8</text>

  <!-- Bottom explanation strip -->
  <rect x="0" y="270" width="800" height="120" fill="#ffffff" opacity="0.02"/>

  <!-- Three insight boxes -->
  <rect x="30" y="284" width="220" height="90" rx="10" fill="#ffffff" opacity="0.03" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.07"/>
  <text x="140" y="306" fill="#f7c948" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">Why x̄ ≠ μ</text>
  <text x="140" y="322" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">A sample mean is almost</text>
  <text x="140" y="336" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">never exactly the true mean.</text>
  <text x="140" y="350" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">Deviations calculated from x̄</text>
  <text x="140" y="364" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">are systematically too small.</text>

  <rect x="290" y="284" width="220" height="90" rx="10" fill="#ffffff" opacity="0.03" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.07"/>
  <text x="400" y="306" fill="#7f5af0" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">The Fix: n-1</text>
  <text x="400" y="322" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">Dividing by n-1 instead of n</text>
  <text x="400" y="336" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">inflates the result slightly —</text>
  <text x="400" y="350" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">exactly enough to cancel out</text>
  <text x="400" y="364" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">the underestimation bias.</text>

  <rect x="550" y="284" width="220" height="90" rx="10" fill="#ffffff" opacity="0.03" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.07"/>
  <text x="660" y="306" fill="#2cb67d" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">Degrees of Freedom</text>
  <text x="660" y="322" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">With n points and x̄ known,</text>
  <text x="660" y="336" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">only n-1 values are free</text>
  <text x="660" y="350" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">to vary. The last one is</text>
  <text x="660" y="364" fill="#ffffff" font-size="9.5" text-anchor="middle" opacity="0.5">always forced by the others.</text>

  <!-- Footer -->
  <rect x="0" y="404" width="800" height="16" fill="#ffffff" opacity="0.02"/>
  <text x="400" y="416" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.2" letter-spacing="1">BESSEL'S CORRECTION — SAURABH.DEV</text>
</svg>
