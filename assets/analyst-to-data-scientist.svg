<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f13"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="roadmap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f5af0"/>
      <stop offset="50%" style="stop-color:#2cb67d"/>
      <stop offset="100%" style="stop-color:#f7c948"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ffffff" opacity="0.25"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <text x="400" y="32" fill="#ffffff" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle" opacity="0.75" letter-spacing="-0.3">Data Analyst → Data Scientist: The Skill Bridge</text>

  <!-- Timeline road -->
  <line x1="60" y1="200" x2="740" y2="200" stroke="url(#roadmap)" stroke-width="3" opacity="0.35"/>

  <!-- Phase dots & labels -->
  <!-- Phase 0: Start -->
  <circle cx="60" cy="200" r="14" fill="#7f5af0" opacity="0.9"/>
  <text x="60" y="204" fill="#ffffff" font-size="9" text-anchor="middle" font-weight="bold">NOW</text>

  <!-- Phase 1: Statistics -->
  <circle cx="200" cy="200" r="14" fill="#7f5af0" opacity="0.85"/>
  <text x="200" y="204" fill="#ffffff" font-size="9" text-anchor="middle">M1-2</text>

  <!-- Phase 2: Python ML -->
  <circle cx="350" cy="200" r="14" fill="#4a8fd4" opacity="0.85"/>
  <text x="350" y="204" fill="#ffffff" font-size="9" text-anchor="middle">M3-4</text>

  <!-- Phase 3: Modeling -->
  <circle cx="500" cy="200" r="14" fill="#2cb67d" opacity="0.85"/>
  <text x="500" y="204" fill="#ffffff" font-size="9" text-anchor="middle">M5-6</text>

  <!-- Phase 4: Portfolio -->
  <circle cx="650" cy="200" r="14" fill="#f7c948" opacity="0.9"/>
  <text x="650" y="204" fill="#ffffff" font-size="9" text-anchor="middle">M7-9</text>

  <!-- Phase 5: End -->
  <circle cx="740" cy="200" r="14" fill="#f7c948" opacity="0.95"/>
  <text x="740" y="204" fill="#0f0f13" font-size="7" text-anchor="middle" font-weight="bold">DS</text>

  <!-- Cards ABOVE timeline -->
  <!-- Phase 1 card -->
  <rect x="130" y="64" width="140" height="100" rx="10" fill="#7f5af0" opacity="0.08" stroke="#7f5af0" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="200" y1="164" x2="200" y2="186" stroke="#7f5af0" stroke-width="1" opacity="0.4"/>
  <text x="200" y="84" fill="#7f5af0" font-size="10" text-anchor="middle" font-weight="bold" font-family="sans-serif">Statistics</text>
  <text x="200" y="100" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">Probability distributions</text>
  <text x="200" y="114" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">Hypothesis testing</text>
  <text x="200" y="128" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">Confidence intervals</text>
  <text x="200" y="142" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">Bayesian basics</text>
  <text x="200" y="156" fill="#7f5af0" font-size="8" text-anchor="middle" opacity="0.7">→ StatQuest / Seeing Theory</text>

  <!-- Phase 2 card BELOW -->
  <line x1="350" y1="214" x2="350" y2="238" stroke="#4a8fd4" stroke-width="1" opacity="0.4"/>
  <rect x="275" y="238" width="150" height="100" rx="10" fill="#4a8fd4" opacity="0.08" stroke="#4a8fd4" stroke-width="1" stroke-opacity="0.4"/>
  <text x="350" y="258" fill="#4a8fd4" font-size="10" text-anchor="middle" font-weight="bold" font-family="sans-serif">Python for ML</text>
  <text x="350" y="274" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">NumPy · Pandas (deeper)</text>
  <text x="350" y="288" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">scikit-learn pipelines</text>
  <text x="350" y="302" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">Feature engineering</text>
  <text x="350" y="316" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">Cross-validation</text>
  <text x="350" y="330" fill="#4a8fd4" font-size="8" text-anchor="middle" opacity="0.7">→ Kaggle Learn / fast.ai</text>

  <!-- Phase 3 card ABOVE -->
  <rect x="422" y="64" width="156" height="100" rx="10" fill="#2cb67d" opacity="0.08" stroke="#2cb67d" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="500" y1="164" x2="500" y2="186" stroke="#2cb67d" stroke-width="1" opacity="0.4"/>
  <text x="500" y="84" fill="#2cb67d" font-size="10" text-anchor="middle" font-weight="bold" font-family="sans-serif">Core Modeling</text>
  <text x="500" y="100" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">Regression · Classification</text>
  <text x="500" y="114" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">Ensemble methods (XGBoost)</text>
  <text x="500" y="128" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">Clustering · Dimensionality</text>
  <text x="500" y="142" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">Model evaluation · MLflow</text>
  <text x="500" y="156" fill="#2cb67d" font-size="8" text-anchor="middle" opacity="0.7">→ Hands-On ML (Géron)</text>

  <!-- Phase 4 card BELOW -->
  <line x1="650" y1="214" x2="650" y2="238" stroke="#f7c948" stroke-width="1" opacity="0.4"/>
  <rect x="572" y="238" width="156" height="100" rx="10" fill="#f7c948" opacity="0.06" stroke="#f7c948" stroke-width="1" stroke-opacity="0.4"/>
  <text x="650" y="258" fill="#f7c948" font-size="10" text-anchor="middle" font-weight="bold" font-family="sans-serif">Portfolio + Job</text>
  <text x="650" y="274" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">2-3 end-to-end projects</text>
  <text x="650" y="288" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">Kaggle competitions</text>
  <text x="650" y="302" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">GitHub + write-ups</text>
  <text x="650" y="316" fill="#ffffff" font-size="8.5" text-anchor="middle" opacity="0.5">DS-adjacent job titles</text>
  <text x="650" y="330" fill="#f7c948" font-size="8" text-anchor="middle" opacity="0.7">→ Target Analytics Eng. first</text>

  <!-- Start label -->
  <text x="60" y="228" fill="#7f5af0" font-size="8" text-anchor="middle" opacity="0.6">Data</text>
  <text x="60" y="238" fill="#7f5af0" font-size="8" text-anchor="middle" opacity="0.6">Analyst</text>

  <!-- End label -->
  <text x="740" y="228" fill="#f7c948" font-size="8" text-anchor="middle" opacity="0.8">Data</text>
  <text x="740" y="238" fill="#f7c948" font-size="8" text-anchor="middle" opacity="0.8">Scientist</text>

  <!-- Your advantage box -->
  <rect x="50" y="358" width="700" height="40" rx="10" fill="#ffffff" opacity="0.03" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.06"/>
  <text x="400" y="374" fill="#ffffff" font-size="10" text-anchor="middle" opacity="0.5">Your advantage as an analyst: SQL fluency · business context · stakeholder communication · data intuition — skills most CS grads lack.</text>
  <text x="400" y="390" fill="#2cb67d" font-size="10" text-anchor="middle" opacity="0.7">You're not starting from zero. You're adding a layer on top of a strong foundation.</text>

  <rect x="0" y="404" width="800" height="16" fill="#ffffff" opacity="0.02"/>
  <text x="400" y="416" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.2" letter-spacing="1">ANALYST TO DATA SCIENTIST ROADMAP — SAURABH.DEV</text>
</svg>
