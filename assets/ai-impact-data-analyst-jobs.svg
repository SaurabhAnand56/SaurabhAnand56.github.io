<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f13"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <linearGradient id="threatened" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:#e53e3e44"/>
    </linearGradient>
    <linearGradient id="evolving" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7c948"/>
      <stop offset="100%" style="stop-color:#f7c94844"/>
    </linearGradient>
    <linearGradient id="growing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2cb67d"/>
      <stop offset="100%" style="stop-color:#2cb67d44"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <text x="400" y="36" fill="#ffffff" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle" opacity="0.75" letter-spacing="-0.3">Impact of AI on Data Analyst Tasks — What's Changing</text>

  <!-- Y axis label -->
  <text x="28" y="220" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.3" transform="rotate(-90, 28, 220)">Automation Risk →</text>

  <!-- Grid -->
  <line x1="70" y1="60" x2="70" y2="320" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  <line x1="70" y1="320" x2="740" y2="320" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  <line x1="70" y1="240" x2="740" y2="240" stroke="#ffffff" stroke-width="0.5" opacity="0.05" stroke-dasharray="4,4"/>
  <line x1="70" y1="160" x2="740" y2="160" stroke="#ffffff" stroke-width="0.5" opacity="0.05" stroke-dasharray="4,4"/>
  <line x1="70" y1="80" x2="740" y2="80" stroke="#ffffff" stroke-width="0.5" opacity="0.05" stroke-dasharray="4,4"/>

  <!-- Y labels -->
  <text x="58" y="324" fill="#ffffff" font-size="8" text-anchor="end" opacity="0.3">0%</text>
  <text x="58" y="244" fill="#ffffff" font-size="8" text-anchor="end" opacity="0.3">30%</text>
  <text x="58" y="164" fill="#ffffff" font-size="8" text-anchor="end" opacity="0.3">60%</text>
  <text x="58" y="84" fill="#ffffff" font-size="8" text-anchor="end" opacity="0.3">90%</text>

  <!-- Bars -->
  <!-- Ad-hoc SQL queries: 85% threatened -->
  <rect x="90" y="92" width="55" height="228" rx="4" fill="url(#threatened)" opacity="0.85"/>
  <text x="117" y="84" fill="#e53e3e" font-size="9" text-anchor="middle">85%</text>

  <!-- Excel/manual reports: 78% threatened -->
  <rect x="175" y="110" width="55" height="210" rx="4" fill="url(#threatened)" opacity="0.7"/>
  <text x="202" y="102" fill="#e53e3e" font-size="9" text-anchor="middle">78%</text>

  <!-- Dashboard building: 55% evolving -->
  <rect x="260" y="174" width="55" height="146" rx="4" fill="url(#evolving)" opacity="0.85"/>
  <text x="287" y="166" fill="#f7c948" font-size="9" text-anchor="middle">55%</text>

  <!-- Data cleaning: 60% evolving -->
  <rect x="345" y="160" width="55" height="160" rx="4" fill="url(#evolving)" opacity="0.75"/>
  <text x="372" y="152" fill="#f7c948" font-size="9" text-anchor="middle">60%</text>

  <!-- Stakeholder communication: 15% growing -->
  <rect x="430" y="280" width="55" height="40" rx="4" fill="url(#growing)" opacity="0.85"/>
  <text x="457" y="272" fill="#2cb67d" font-size="9" text-anchor="middle">15%</text>

  <!-- Strategic analysis: 10% growing -->
  <rect x="515" y="293" width="55" height="27" rx="4" fill="url(#growing)" opacity="0.75"/>
  <text x="542" y="285" fill="#2cb67d" font-size="9" text-anchor="middle">10%</text>

  <!-- ML/AI oversight: 5% growing -->
  <rect x="600" y="307" width="55" height="13" rx="4" fill="url(#growing)" opacity="0.9"/>
  <text x="627" y="299" fill="#2cb67d" font-size="9" text-anchor="middle">5%</text>

  <!-- Business judgment: 8% growing -->
  <rect x="685" y="299" width="55" height="21" rx="4" fill="url(#growing)" opacity="0.8"/>
  <text x="712" y="291" fill="#2cb67d" font-size="9" text-anchor="middle">8%</text>

  <!-- X labels -->
  <text x="117" y="338" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Ad-hoc</text>
  <text x="117" y="348" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">SQL</text>
  <text x="202" y="338" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Manual</text>
  <text x="202" y="348" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Reports</text>
  <text x="287" y="338" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Dashboard</text>
  <text x="287" y="348" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Building</text>
  <text x="372" y="338" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Data</text>
  <text x="372" y="348" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Cleaning</text>
  <text x="457" y="338" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Stakeholder</text>
  <text x="457" y="348" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Comms</text>
  <text x="542" y="338" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Strategic</text>
  <text x="542" y="348" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Analysis</text>
  <text x="627" y="338" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">AI/ML</text>
  <text x="627" y="348" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Oversight</text>
  <text x="712" y="338" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Business</text>
  <text x="712" y="348" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">Judgment</text>

  <!-- Legend -->
  <rect x="70" y="368" width="10" height="10" rx="2" fill="#e53e3e" opacity="0.85"/>
  <text x="86" y="377" fill="#ffffff" font-size="9" opacity="0.5">High automation risk</text>
  <rect x="230" y="368" width="10" height="10" rx="2" fill="#f7c948" opacity="0.85"/>
  <text x="246" y="377" fill="#ffffff" font-size="9" opacity="0.5">Evolving (AI-assisted)</text>
  <rect x="400" y="368" width="10" height="10" rx="2" fill="#2cb67d" opacity="0.85"/>
  <text x="416" y="377" fill="#ffffff" font-size="9" opacity="0.5">Growing in value</text>

  <rect x="0" y="404" width="800" height="16" fill="#ffffff" opacity="0.02"/>
  <text x="400" y="416" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.2" letter-spacing="1">AI IMPACT ON DATA ANALYST ROLES — SAURABH.DEV</text>
</svg>
